name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a running release

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    # Only release when commit message follows conventional commit spec
    # OR when manually triggered
    if: |
      contains(github.event.head_commit.message, 'feat:') ||
      contains(github.event.head_commit.message, 'fix:') ||
      contains(github.event.head_commit.message, 'perf:') ||
      contains(github.event.head_commit.message, 'BREAKING CHANGE') ||
      startsWith(github.event.head_commit.message, 'chore(release)')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history for changelog generation
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

      - name: Bump version and generate changelog
        id: bump
        run: |
          # Determine bump type from commit messages since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          COMMITS=$(git log ${LAST_TAG:+$LAST_TAG..}HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          # Read current version
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case $BUMP in
            major)  NEW_VERSION="$((MAJOR+1)).0.0" ;;
            minor)  NEW_VERSION="${MAJOR}.$((MINOR+1)).0" ;;
            patch)  NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac

          echo "current_version=$CURRENT"     >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION"      >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP"               >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION"             >> $GITHUB_OUTPUT

          # Update package.json version
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          echo "Bumped $CURRENT → $NEW_VERSION ($BUMP)"

      - name: Generate CHANGELOG
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          NEW_TAG="${{ steps.bump.outputs.tag }}"
          DATE=$(date +%Y-%m-%d)

          # Build changelog section
          SECTION="## [${{ steps.bump.outputs.new_version }}] — $DATE\n\n"

          append_section() {
            local TITLE="$1"; local PATTERN="$2"
            local COMMITS
            COMMITS=$(git log ${LAST_TAG:+$LAST_TAG..}HEAD --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --grep="$PATTERN" 2>/dev/null || true)
            if [ -n "$COMMITS" ]; then
              SECTION+="### $TITLE\n\n$COMMITS\n\n"
            fi
          }

          append_section "Breaking Changes" "BREAKING CHANGE"
          append_section "Features"         "^feat"
          append_section "Bug Fixes"        "^fix"
          append_section "Performance"      "^perf"
          append_section "Documentation"    "^docs"
          append_section "Maintenance"      "^chore"
          append_section "Refactoring"      "^refactor"

          # Prepend to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            EXISTING=$(cat CHANGELOG.md)
            printf "# Changelog\n\n${SECTION}${EXISTING#\# Changelog}" > CHANGELOG.md
          else
            printf "# Changelog\n\n${SECTION}" > CHANGELOG.md
          fi

          echo "changelog_section<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SECTION"            >> $GITHUB_OUTPUT
          echo "EOF"                    >> $GITHUB_OUTPUT

      - name: Commit version bump + changelog
        run: |
          git add package.json CHANGELOG.md
          git commit -m "chore(release): v${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.createRelease({
              owner:            context.repo.owner,
              repo:             context.repo.repo,
              tag_name:         '${{ steps.bump.outputs.tag }}',
              name:             'Identity Capsule OS ${{ steps.bump.outputs.tag }}',
              body:             `${{ steps.changelog.outputs.changelog_section }}`,
              draft:            false,
              prerelease:       false,
              make_latest:      'true',
            });
            console.log('Release created:', release.html_url);
